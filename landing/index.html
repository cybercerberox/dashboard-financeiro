<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Financeiro</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: linear-gradient(135deg, #020617, #050816, #0f172a);
        color: white;
      }

      .container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
        gap: 60px;
        flex-wrap: wrap;
      }

      .left {
        max-width: 550px;
      }

      .badge {
        background: #10b98122;
        color: #34d399;
        display: inline-block;
        padding: 10px 18px;
        border-radius: 999px;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 60px;
        line-height: 1.1;
      }

      p {
        color: #cbd5e1;
        font-size: 18px;
        line-height: 1.6;
      }

      .buttons {
        margin-top: 30px;
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
      }

      .btn {
        text-decoration: none;
        padding: 16px 28px;
        border-radius: 14px;
        font-weight: bold;
      }

      .primary {
        background: #4f46e5;
        color: #e2e8f0;
      }

      .secondary {
        background: #1e293b;
        color: #cbd5e1;
        border: 1px solid #334155;
      }

      .mockup {
        width: 420px;
        background: #ffffff08;
        border: 1px solid #ffffff11;
        border-radius: 24px;
        padding: 25px;
      }

      .cards {
        display: flex;
        gap: 15px;
        margin-bottom: 20px;
      }

      .card {
        flex: 1;
        padding: 20px;
        border-radius: 16px;
      }

      .green {
        background: #312e81;
      }

      .red {
        background: #312e81;
      }

      .chart {
        height: 220px;
        display: flex;
        align-items: flex-end;
        gap: 12px;
      }

      .bar {
        flex: 1;
        background: #312e81;
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="left">
        <div class="badge">Dashboard Inteligente</div>

        <h1>Visualize suas finanças de forma simples</h1>

        <p>
          Um dashboard moderno para acompanhar receitas, despesas e gráficos
          financeiros em um só lugar.
        </p>

        <div class="buttons">
          <a
            class="btn primary"
            href="https://dashboarfinance.streamlit.app/"
            target="_blank"
          >
            Ver Dashboard
          </a>

          <a
            class="btn secondary"
            href="https://github.com/cybercerberox/dashboard-financeiro"
            target="_blank"
          >
            GitHub
          </a>
        </div>
      </div>

      <div class="mockup">
        <div class="cards">
          <div class="card green">
            <h3>Receitas</h3>
          </div>

          <div class="card red">
            <h3>Despesas</h3>
          </div>
        </div>

        <div class="chart">
          <div class="bar" style="height: 90px"></div>
          <div class="bar" style="height: 140px"></div>
          <div class="bar" style="height: 180px"></div>
          <div class="bar" style="height: 120px"></div>
          <div class="bar" style="height: 200px"></div>
        </div>
      </div>
    </div>
  </body>
</html>
